services:
  - type: web
    name: bemc-platform
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm install --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: npm run start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
